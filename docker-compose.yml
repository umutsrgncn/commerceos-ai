services:
  postgres:
    image: postgres:16-alpine
    container_name: commerceos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-commerceos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-commerceos}
      POSTGRES_DB: ${POSTGRES_DB:-commerceos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Fresh-init only: creates the AI service's read-only user.
      # Existing volumes apply manually:
      #   docker exec -i commerceos-postgres psql -U commerceos -d commerceos < db/init/01-readonly-user.sql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-commerceos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: commerceos-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: commerceos-ai-service
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    environment:
      REDIS_URL: redis://redis:6379
      # AI service connects to postgres via the read-only user.
      READONLY_DATABASE_URL: postgresql://commerceos_readonly:readonly_pwd_2026@postgres:5432/commerceos
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
